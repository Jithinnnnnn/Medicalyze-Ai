# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - medicalizer

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 1. OPT-IN TO NODE 24 RUNNER (Removes the deprecation warning)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build
        env:
          NODE_ENV: production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || 'build-time-placeholder' }}

      - name: Create standalone deployment package
        run: |
          mkdir -p deployment/.next
          # Copy standalone build files
          cp -r .next/standalone/. ./deployment/
          # Copy static files (Required for Next.js standalone mode)
          cp -r .next/static ./deployment/.next/static
          # Copy public folder if it exists and has content
          if [ -d "public" ] && [ "$(ls -A public 2>/dev/null)" ]; then
            cp -r public ./deployment/public
          else
            mkdir -p ./deployment/public
          fi
          # Copy package.json so Azure detects the Node.js runtime
          cp package.json ./deployment/
          
      - name: Create web.config for Azure
        run: |
          cat > ./deployment/web.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <system.webServer>
              <handlers>
                <add name="iisnode" path="server.js" verb="*" modules="iisnode"/>
              </handlers>
              <rewrite>
                <rules>
                  <rule name="NodeInspector" patternSyntax="ECMAScript" stopProcessing="true">
                    <match url="^server.js\/debug[\/]?" />
                  </rule>
                  <rule name="StaticContent">
                    <action type="Rewrite" url="public{REQUEST_URI}"/>
                  </rule>
                  <rule name="DynamicContent">
                    <conditions>
                      <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                    </conditions>
                    <action type="Rewrite" url="server.js"/>
                  </rule>
                </rules>
              </rewrite>
              <httpErrors existingResponse="PassThrough" />
              <iisnode node_env="production" watchedFiles="*.js;iisnode.yml" loggingEnabled="true" devErrorsEnabled="false" />
            </system.webServer>
          </configuration>
          EOF

      - name: Zip deployment package
        run: |
          cd deployment
          zip -r ../deployment.zip .
          cd ..

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deployment.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip deployment package
        run: |
          mkdir deploy_folder
          unzip deployment.zip -d deploy_folder

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AD3CF73A676F4695A1D6AEBF1C3F3524 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_35EE28BE9EA94FAABF7F7C76640963CD }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6224754458FD4709B5A083F0E97841FD }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'medicalizer'
          package: ./deploy_folder